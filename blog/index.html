<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Blog — Daydream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F2F4EE;
            --cream-dark: #EBE8E0;
            --warm-gray: #9A958A;
            --warm-gray-light: #C4BFB4;
            --charcoal: #4A4640;
            --charcoal-soft: #6B665C;
            --gold: #c4a87c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            line-height: 1.7;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .header-logo svg { width: 38px; height: 34px; }

        .header-right {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .header-link {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--charcoal-soft);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
            padding: 0.75rem 0;
        }

        .header-link:hover { color: var(--charcoal); }

        .header-cta-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .login-link { color: var(--charcoal); font-weight: 500; }

        .request-trial-link {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--charcoal-soft);
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.3s ease;
            letter-spacing: 0.01em;
        }

        .request-trial-link:hover { color: var(--charcoal); }

        /* ── Blog Content ── */
        .blog-container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 7rem 2rem 4rem;
            width: 100%;
        }

        .blog-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 3rem;
            color: var(--charcoal);
            text-align: center;
            animation: fadeUp 1.2s ease-out;
        }

        /* ── Blog Card Grid ── */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            animation: fadeUp 1.2s ease-out 0.1s both;
        }

        .blog-card {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-4px);
        }

        .blog-card:hover .blog-card-image {
            box-shadow: 0 12px 40px rgba(74, 70, 64, 0.15);
        }

        .blog-card-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--cream-dark);
            transition: box-shadow 0.3s ease;
            box-shadow: 0 4px 20px rgba(74, 70, 64, 0.08);
        }

        .blog-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .blog-card-body {
            padding: 1rem 0.25rem;
        }

        .blog-card-tag {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--warm-gray);
            margin-bottom: 0.4rem;
        }

        .blog-card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--charcoal);
            line-height: 1.3;
            margin-bottom: 0.35rem;
        }

        .blog-card-date {
            font-size: 0.8rem;
            color: var(--warm-gray-light);
        }

        /* ── Footer ── */
        footer {
            padding: 3rem 2rem;
            text-align: center;
        }

        .footer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .footer-logo { display: inline-block; }
        .footer-logo svg { width: 34px; height: 30px; }

        .footer-links { display: flex; gap: 1.5rem; }

        .footer-links a {
            font-size: 0.85rem;
            color: var(--warm-gray);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover { color: var(--charcoal); }

        .footer-text {
            font-size: 0.8rem;
            color: var(--warm-gray-light);
        }

        /* ── Audio Pill (card) ── */
        .audio-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.35rem;
            background: linear-gradient(135deg, #f4f6f0, #eef2e8);
            border: 1px solid rgba(143, 191, 143, 0.3);
            border-radius: 20px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .audio-pill:hover { border-color: rgba(143, 191, 143, 0.6); box-shadow: 0 2px 12px rgba(61, 92, 61, 0.08); }

        .audio-pill-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8FBF8F, #3D5C3D);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(61, 92, 61, 0.25);
        }

        .audio-pill-icon svg { width: 8px; height: 8px; fill: white; margin-left: 1px; }

        .audio-pill-wave {
            display: flex;
            align-items: center;
            gap: 1.5px;
            height: 14px;
        }

        .audio-pill-wave .bar {
            width: 2px;
            border-radius: 1px;
            background: rgba(143, 191, 143, 0.3);
            transition: background 0.15s ease;
        }

        .audio-pill-wave .bar.active { background: #3D5C3D; }

        .audio-pill-time {
            font-size: 0.6rem;
            color: var(--warm-gray);
            font-variant-numeric: tabular-nums;
            padding-right: 0.35rem;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .header { padding: 1rem 1.5rem; }
            .blog-grid { grid-template-columns: 1fr; }
            .blog-container { padding: 6rem 1.5rem 3rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="header-logo">
            <svg viewBox="0 0 100 90" fill="none">
                <defs>
                    <linearGradient id="hwL" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#A8D4A8"/><stop offset="60%" stop-color="#8FBF8F"/><stop offset="100%" stop-color="#3D5C3D"/>
                    </linearGradient>
                    <linearGradient id="hwR" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#A8D4A8"/><stop offset="60%" stop-color="#8FBF8F"/><stop offset="100%" stop-color="#3D5C3D"/>
                    </linearGradient>
                    <radialGradient id="hGlow" cx="50%" cy="40%" r="50%">
                        <stop offset="0%" stop-color="#A8D4A8" stop-opacity="0.6"/><stop offset="100%" stop-color="#8FBF8F" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                <g style="transform-origin:50px 45px;transform:perspective(200px) rotateY(20deg)">
                    <path d="M48 26 C42 14,28 4,12 6 C4 8,1 16,2 26 C3 36,12 44,28 45 C40 45,47 38,48 26Z" fill="url(#hwL)" stroke="#1A1A1A" stroke-width="1"/>
                    <path d="M44 28 C40 20,30 14,20 14 C14 14,10 18,10 24 C10 30,16 36,28 40 C38 43,44 38,44 32Z" fill="url(#hGlow)"/>
                    <path d="M46 30 C38 26,28 22,18 20" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <path d="M46 34 C36 32,24 32,14 34" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <circle cx="6" cy="12" r="2.5" fill="#1A1A1A" opacity="0.9"/><circle cx="4" cy="20" r="2.2" fill="#1A1A1A" opacity="0.85"/><circle cx="3" cy="28" r="2" fill="#1A1A1A" opacity="0.8"/>
                    <path d="M48 40 C44 46,32 56,20 66 C12 74,12 82,20 86 C32 90,44 82,48 68 C51 56,50 46,48 40Z" fill="url(#hwL)" stroke="#1A1A1A" stroke-width="1"/>
                    <path d="M48 46 C42 54,34 62,28 70" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <circle cx="16" cy="72" r="2" fill="#1A1A1A" opacity="0.85"/><circle cx="16" cy="80" r="1.8" fill="#1A1A1A" opacity="0.8"/>
                </g>
                <g style="transform-origin:50px 45px;transform:perspective(200px) rotateY(-20deg)">
                    <path d="M52 26 C58 14,72 4,88 6 C96 8,99 16,98 26 C97 36,88 44,72 45 C60 45,53 38,52 26Z" fill="url(#hwR)" stroke="#1A1A1A" stroke-width="1"/>
                    <path d="M56 28 C60 20,70 14,80 14 C86 14,90 18,90 24 C90 30,84 36,72 40 C62 43,56 38,56 32Z" fill="url(#hGlow)"/>
                    <path d="M54 30 C62 26,72 22,82 20" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <path d="M54 34 C64 32,76 32,86 34" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <circle cx="94" cy="12" r="2.5" fill="#1A1A1A" opacity="0.9"/><circle cx="96" cy="20" r="2.2" fill="#1A1A1A" opacity="0.85"/><circle cx="97" cy="28" r="2" fill="#1A1A1A" opacity="0.8"/>
                    <path d="M52 40 C56 46,68 56,80 66 C88 74,88 82,80 86 C68 90,56 82,52 68 C49 56,50 46,52 40Z" fill="url(#hwR)" stroke="#1A1A1A" stroke-width="1"/>
                    <path d="M52 46 C58 54,66 62,72 70" stroke="#1A1A1A" stroke-width="0.5" fill="none" opacity="0.7"/>
                    <circle cx="84" cy="72" r="2" fill="#1A1A1A" opacity="0.85"/><circle cx="84" cy="80" r="1.8" fill="#1A1A1A" opacity="0.8"/>
                </g>
                <ellipse cx="50" cy="58" rx="3.2" ry="18" fill="#1A1A1A"/><ellipse cx="50" cy="38" rx="4" ry="6" fill="#1A1A1A"/><circle cx="50" cy="28" r="5" fill="#1A1A1A"/>
                <path d="M47 24 Q40 14,34 6" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M53 24 Q60 14,66 6" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <circle cx="34" cy="6" r="2" fill="#1A1A1A"/><circle cx="66" cy="6" r="2" fill="#1A1A1A"/>
            </svg>
        </a>
        <div class="header-right">
            <a href="/" class="header-link">Home</a>
            <div class="header-cta-group">
                <a href="https://exp.daydreamers.app/" class="header-link login-link">Log in</a>
                <a href="/#trial-form" class="request-trial-link">Request trial</a>
            </div>
        </div>
    </header>

    <main class="blog-container">
        <h1 class="blog-heading">Blog</h1>

        <div class="blog-grid">
            <a href="/blog/the-belief-terrain" class="blog-card">
                <div class="blog-card-image">
                    <img src="/blog/the-belief-terrain/cover.png" alt="The Belief Terrain — a 3D landscape of glowing nodes representing personal beliefs" />
                </div>
                <div class="blog-card-body">
                    <div class="blog-card-tag">Product</div>
                    <h2 class="blog-card-title">The Belief Terrain</h2>
                    <div class="blog-card-date">March 23, 2026</div>
                    <div class="audio-pill" id="audioPill" onclick="event.preventDefault(); event.stopPropagation(); togglePill();">
                        <div class="audio-pill-icon">
                            <svg id="pillPlayIcon" viewBox="0 0 16 16"><polygon points="5,2 13,8 5,14"/></svg>
                            <svg id="pillPauseIcon" viewBox="0 0 16 16" style="display:none"><rect x="3" y="2" width="3.5" height="12"/><rect x="9.5" y="2" width="3.5" height="12"/></svg>
                        </div>
                        <div class="audio-pill-wave" id="pillWave"></div>
                        <span class="audio-pill-time" id="pillTime">0:55</span>
                    </div>
                </div>
            </a>
            <audio id="pillAudio" preload="metadata" src="/blog/the-belief-terrain/audio.mp3"></audio>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-logo">
                <svg viewBox="0 0 100 90" fill="none">
                    <defs>
                        <linearGradient id="fwL" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#A8D4A8"/><stop offset="60%" stop-color="#8FBF8F"/><stop offset="100%" stop-color="#3D5C3D"/>
                        </linearGradient>
                        <linearGradient id="fwR" x1="100%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#A8D4A8"/><stop offset="60%" stop-color="#8FBF8F"/><stop offset="100%" stop-color="#3D5C3D"/>
                        </linearGradient>
                    </defs>
                    <g style="transform-origin:50px 45px;transform:perspective(200px) rotateY(20deg)">
                        <path d="M48 26 C42 14,28 4,12 6 C4 8,1 16,2 26 C3 36,12 44,28 45 C40 45,47 38,48 26Z" fill="url(#fwL)" stroke="#1A1A1A" stroke-width="1"/>
                        <path d="M48 40 C44 46,32 56,20 66 C12 74,12 82,20 86 C32 90,44 82,48 68 C51 56,50 46,48 40Z" fill="url(#fwL)" stroke="#1A1A1A" stroke-width="1"/>
                    </g>
                    <g style="transform-origin:50px 45px;transform:perspective(200px) rotateY(-20deg)">
                        <path d="M52 26 C58 14,72 4,88 6 C96 8,99 16,98 26 C97 36,88 44,72 45 C60 45,53 38,52 26Z" fill="url(#fwR)" stroke="#1A1A1A" stroke-width="1"/>
                        <path d="M52 40 C56 46,68 56,80 66 C88 74,88 82,80 86 C68 90,56 82,52 68 C49 56,50 46,52 40Z" fill="url(#fwR)" stroke="#1A1A1A" stroke-width="1"/>
                    </g>
                    <ellipse cx="50" cy="58" rx="3.2" ry="18" fill="#1A1A1A"/><ellipse cx="50" cy="38" rx="4" ry="6" fill="#1A1A1A"/><circle cx="50" cy="28" r="5" fill="#1A1A1A"/>
                    <path d="M47 24 Q40 14,34 6" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                    <path d="M53 24 Q60 14,66 6" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                    <circle cx="34" cy="6" r="2" fill="#1A1A1A"/><circle cx="66" cy="6" r="2" fill="#1A1A1A"/>
                </svg>
            </div>
            <div class="footer-links">
                <a href="/">Home</a>
            </div>
            <p class="footer-text">San Francisco, 2026</p>
        </div>
    </footer>
    <script>
    (function() {
        const audio = document.getElementById('pillAudio');
        const playIcon = document.getElementById('pillPlayIcon');
        const pauseIcon = document.getElementById('pillPauseIcon');
        const waveEl = document.getElementById('pillWave');
        const timeEl = document.getElementById('pillTime');
        let animFrame = null;

        // Generate mini waveform
        const barCount = 20;
        const barHeights = [];
        for (var i = 0; i < barCount; i++) {
            var bar = document.createElement('div');
            bar.className = 'bar';
            var h = 3 + Math.random() * 10;
            bar.style.height = h + 'px';
            barHeights.push(h);
            waveEl.appendChild(bar);
        }
        var bars = waveEl.querySelectorAll('.bar');

        function fmt(s) {
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + String(sec).padStart(2, '0');
        }

        function animate() {
            if (audio.paused || !audio.duration) return;
            var progress = audio.currentTime / audio.duration;
            var activeIdx = Math.floor(progress * barCount);
            bars.forEach(function(b, i) {
                b.classList.toggle('active', i <= activeIdx);
                if (i <= activeIdx && i > activeIdx - 3) {
                    b.style.height = (3 + Math.random() * 10) + 'px';
                } else {
                    b.style.height = barHeights[i] + 'px';
                }
            });
            timeEl.textContent = fmt(audio.duration - audio.currentTime);
            animFrame = requestAnimationFrame(animate);
        }

        window.togglePill = function() {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        };

        audio.onplay = function() { playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; animate(); };
        audio.onpause = function() { playIcon.style.display = 'block'; pauseIcon.style.display = 'none'; cancelAnimationFrame(animFrame); };
        audio.onloadedmetadata = function() { timeEl.textContent = fmt(audio.duration); };

        audio.onended = function() {
            cancelAnimationFrame(animFrame);
            bars.forEach(function(b, i) { b.classList.remove('active'); b.style.height = barHeights[i] + 'px'; });
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            timeEl.textContent = fmt(audio.duration);
        };
    })();
    </script>
</body>
</html>
