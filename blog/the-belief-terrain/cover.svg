<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b14"/>
      <stop offset="40%" stop-color="#121828"/>
      <stop offset="100%" stop-color="#1a1f32"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#6B9A7A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#9878B8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#C49545" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#sky)"/>

  <!-- Atmospheric glows -->
  <rect width="800" height="800" fill="url(#glow1)"/>
  <rect width="800" height="800" fill="url(#glow2)"/>
  <rect width="800" height="800" fill="url(#glow3)"/>

  <!-- Terrain contour lines -->
  <g opacity="0.15" fill="none" stroke="#8B7355" stroke-width="0.8">
    <path d="M0 650 Q200 600 400 620 Q600 640 800 610"/>
    <path d="M0 600 Q150 550 350 560 Q550 570 700 540 Q750 535 800 550"/>
    <path d="M0 550 Q200 500 380 510 Q500 520 650 490 Q750 475 800 490"/>
    <path d="M0 500 Q100 470 250 460 Q400 450 550 430 Q700 410 800 430"/>
    <path d="M0 450 Q150 410 300 400 Q450 390 600 370 Q750 350 800 370"/>
    <path d="M0 400 Q200 360 350 350 Q500 340 650 310 Q750 300 800 310"/>
  </g>

  <!-- Ridge lines -->
  <g opacity="0.1" fill="none" stroke="#C4BFB4" stroke-width="0.5">
    <path d="M200 500 Q300 420 400 440 Q500 460 600 380"/>
    <path d="M100 550 Q250 470 400 490 Q550 510 700 430"/>
  </g>

  <!-- Belief nodes - aligned (above) -->
  <g filter="url(#blur1)">
    <circle cx="220" cy="460" r="18" fill="#6B9A7A" opacity="0.4"/>
    <circle cx="380" cy="400" r="22" fill="#8B9B5A" opacity="0.35"/>
    <circle cx="520" cy="350" r="26" fill="#C49545" opacity="0.35"/>
    <circle cx="650" cy="310" r="20" fill="#9878B8" opacity="0.4"/>
  </g>

  <!-- Belief nodes - sharp -->
  <g filter="url(#blur2)">
    <circle cx="220" cy="460" r="6" fill="#6B9A7A" opacity="0.9"/>
    <circle cx="380" cy="400" r="7" fill="#8B9B5A" opacity="0.85"/>
    <circle cx="520" cy="350" r="8" fill="#C49545" opacity="0.85"/>
    <circle cx="650" cy="310" r="6.5" fill="#9878B8" opacity="0.9"/>
  </g>

  <!-- Belief nodes - limiting (below) -->
  <g filter="url(#blur1)">
    <circle cx="180" cy="600" r="14" fill="#B85A5A" opacity="0.3"/>
    <circle cx="350" cy="580" r="16" fill="#997070" opacity="0.25"/>
    <circle cx="550" cy="620" r="12" fill="#887878" opacity="0.25"/>
  </g>

  <g filter="url(#blur2)">
    <circle cx="180" cy="600" r="4.5" fill="#B85A5A" opacity="0.8"/>
    <circle cx="350" cy="580" r="5" fill="#997070" opacity="0.75"/>
    <circle cx="550" cy="620" r="4" fill="#887878" opacity="0.7"/>
  </g>

  <!-- Journey trails -->
  <g fill="none" stroke-width="1" opacity="0.3">
    <path d="M220 460 Q300 430 380 400" stroke="#8B9B5A" stroke-dasharray="4 6"/>
    <path d="M380 400 Q450 375 520 350" stroke="#C49545" stroke-dasharray="4 6"/>
    <path d="M520 350 Q585 330 650 310" stroke="#9878B8" stroke-dasharray="4 6"/>
  </g>

  <!-- Particles -->
  <g fill="#C4A87C" opacity="0.3">
    <circle cx="150" cy="350" r="1.2"/>
    <circle cx="300" cy="300" r="1"/>
    <circle cx="450" cy="280" r="1.3"/>
    <circle cx="600" cy="260" r="0.9"/>
    <circle cx="700" cy="380" r="1.1"/>
    <circle cx="250" cy="520" r="1"/>
    <circle cx="480" cy="500" r="1.2"/>
    <circle cx="680" cy="450" r="0.8"/>
    <circle cx="120" cy="420" r="0.9"/>
    <circle cx="560" cy="290" r="1.1"/>
  </g>

  <!-- Open waters region -->
  <g opacity="0.08">
    <ellipse cx="130" cy="550" rx="80" ry="60" fill="#4A9BA8"/>
  </g>
</svg>
