<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Main sphere gradient - golden with light coming from top-left -->
    <radialGradient id="orb" cx="42%" cy="38%" r="50%" fx="38%" fy="34%">
      <stop offset="0%" stop-color="#f0e4c8"/>
      <stop offset="20%" stop-color="#dcc994"/>
      <stop offset="45%" stop-color="#c4a86c"/>
      <stop offset="70%" stop-color="#a8894e"/>
      <stop offset="90%" stop-color="#8b7040"/>
      <stop offset="100%" stop-color="#7a6238"/>
    </radialGradient>
    <!-- Top highlight -->
    <radialGradient id="highlight" cx="40%" cy="32%" r="35%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#f5e6c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c4a86c" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft glow behind orb -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#d4bc8a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4bc8a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Subtle glow -->
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>
  <!-- Main orb -->
  <circle cx="50" cy="50" r="30" fill="url(#orb)"/>
  <!-- Highlight overlay -->
  <circle cx="50" cy="50" r="30" fill="url(#highlight)"/>
</svg>
